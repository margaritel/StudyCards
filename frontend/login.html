<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare — Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">StudyShare</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-card">
      <h2>Добро пожаловать</h2>
      <p class="text-muted small mb-4">Войдите в свой аккаунт</p>

      <div id="msg"></div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">Имя пользователя</label>
        <input type="text" class="form-control" id="username" placeholder="username" autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Пароль</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-accent w-100 mb-3 py-2" id="login-btn">Войти</button>

      <p class="text-center text-muted small mb-0">
        Нет аккаунта? <a href="register.html" class="fw-semibold" style="color:var(--accent)">Зарегистрироваться</a>
      </p>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    // Если уже залогинен — на главную
    if (getCurrentUser()) window.location.href = 'index.html';

    async function doLogin() {
      hideMessage('msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username) { showError('msg', 'Введите имя пользователя'); return; }
      if (!password) { showError('msg', 'Введите пароль'); return; }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Входим...';

      try {
        const data = await apiRequest('POST', '/auth/login', { username, password });
        saveAuth(data.token, data.user);
        window.location.href = 'index.html';
      } catch (e) {
        showError('msg', e.message);
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
