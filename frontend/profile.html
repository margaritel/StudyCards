<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyShare — Профиль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">StudyShare</a>
      <div class="ms-auto d-flex gap-2">
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Выйти</button>
      </div>
    </div>
  </nav>

  <!-- Profile header -->
  <div class="profile-header">
    <div class="container">
      <div class="d-flex align-items-center gap-3">
        <div class="avatar-circle" id="avatar">?</div>
        <div>
          <h2 class="fw-bold mb-0" id="profile-username">...</h2>
          <div class="text-muted small mt-1" id="profile-stats"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="bg-white border-bottom">
    <div class="container">
      <ul class="nav tab-nav">
        <li class="nav-item">
          <a class="nav-link active" href="#" onclick="switchTab(event, 'my')">Мои наборы</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="switchTab(event, 'fav')">Лайки</a>
        </li>
      </ul>
    </div>
  </div>

  <!-- My sets -->
  <section class="py-5" id="tab-my">
    <div class="container">
      <div class="row g-3" id="my-sets-row">
        <div class="col-sm-6 col-md-4 col-lg-3">
          <a href="create.html" class="text-decoration-none d-flex flex-column align-items-center justify-content-center"
            style="height:100%; min-height:180px; background:#fff; border: 2px dashed #c4b5fd; border-radius:14px; color:#6366f1;">
            <span style="font-size:2.5rem; line-height:1;">+</span>
            <span class="fw-semibold mt-2" style="font-size:0.95rem;">Создать набор</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- Favorites -->
  <section class="py-5 d-none" id="tab-fav">
    <div class="container">
      <div id="fav-sets" class="row g-3">
        <div class="col-12 text-center text-muted py-4">Загрузка...</div>
      </div>
    </div>
  </section>

  <footer class="border-top py-4 text-center text-muted small">© 2025 StudyShare</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="api.js"></script>
  <script>
    const user = getCurrentUser();
    if (!user) window.location.href = 'login.html';

    document.getElementById('avatar').textContent = user.username[0].toUpperCase();
    document.getElementById('profile-username').textContent = '@' + user.username;

    async function loadMySets() {
      try {
        const sets = await apiRequest('GET', '/sets/my?username=' + encodeURIComponent(user.username));
        const row = document.getElementById('my-sets-row');

        // Удаляем старые динамические карточки
        row.querySelectorAll('.dynamic-set').forEach(el => el.remove());

        sets.forEach(s => {
          const col = document.createElement('div');
          col.className = 'col-sm-6 col-md-4 col-lg-3 dynamic-set';
          col.id = 'set-' + s.id;
          col.innerHTML = `
            <div class="set-card h-100">
              <div class="set-card-subject ${getSubjectClass(s.subject)}">${escapeHtml(s.subject)}${s.grade ? ' · ' + escapeHtml(s.grade) : ''}</div>
              <div class="set-card-title">${escapeHtml(s.title)}</div>
              <div class="set-card-meta">
                <span>${cardWord(s.cards_count)}</span>
                <span>❤️ ${s.likes_count}</span>
              </div>
              <div class="d-flex gap-2 mt-3">
                <a href="study.html?id=${s.id}" class="btn btn-accent btn-sm flex-grow-1">Учить</a>
                <a href="create.html?edit=${s.id}" class="btn btn-outline-secondary btn-sm">✏️</a>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteSet(${s.id})">🗑</button>
              </div>
            </div>
          `;
          row.appendChild(col);
        });

        document.getElementById('profile-stats').textContent = setWord(sets.length);
      } catch (e) {
        console.error(e);
      }
    }

    async function loadFavSets() {
      const container = document.getElementById('fav-sets');
      try {
        // Берём лайкнутые id из localStorage
        const likedIds = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith('liked_') && localStorage.getItem(key) === '1') {
            likedIds.push(parseInt(key.replace('liked_', '')));
          }
        }

        if (likedIds.length === 0) {
          container.innerHTML = '<div class="col-12 text-center text-muted py-4">Нет лайкнутых наборов</div>';
          return;
        }

        // Загружаем все наборы и фильтруем по id
        const allSets = await apiRequest('GET', '/sets/?sort=popular');
        const sets = allSets.filter(s => likedIds.includes(s.id));

        if (sets.length === 0) {
          container.innerHTML = '<div class="col-12 text-center text-muted py-4">Нет лайкнутых наборов</div>';
          return;
        }

        container.innerHTML = sets.map(s => `
          <div class="col-sm-6 col-md-4 col-lg-3">
            <a href="set.html?id=${s.id}" class="set-card text-decoration-none">
              <div class="set-card-subject ${getSubjectClass(s.subject)}">${escapeHtml(s.subject)}${s.grade ? ' · ' + escapeHtml(s.grade) : ''}</div>
              <div class="set-card-title">${escapeHtml(s.title)}</div>
              <div class="set-card-meta">
                <span>${s.cards_count} карточек</span>
                <span>❤️ ${s.likes_count}</span>
              </div>
              <div class="set-card-author">@${escapeHtml(s.author_username)}</div>
            </a>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<div class="col-12 text-muted">Ошибка загрузки</div>';
      }
    }

    async function deleteSet(id) {
      if (!confirm('Удалить этот набор?')) return;
      try {
        await apiRequest('DELETE', '/sets/' + id);
        document.getElementById('set-' + id).remove();
      } catch (e) {
        alert(e.message);
      }
    }

    function switchTab(e, tab) {
      e.preventDefault();
      document.querySelectorAll('.tab-nav .nav-link').forEach(l => l.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById('tab-my').classList.add('d-none');
      document.getElementById('tab-fav').classList.add('d-none');
      document.getElementById('tab-' + tab).classList.remove('d-none');
    }

    function logout() {
      clearAuth();
      window.location.href = 'index.html';
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setWord(n) {
      const abs = Math.abs(n) % 100;
      const n1 = abs % 10;
      if (abs > 10 && abs < 20) return n + ' наборов';
      if (n1 > 1 && n1 < 5) return n + ' набора';
      if (n1 === 1) return n + ' набор';
      return n + ' наборов';
    }

    loadMySets();
    loadFavSets();
  </script>
</body>
</html>
